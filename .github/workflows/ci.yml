# Lightweight validation: install → lint/types → unit tests → compile.
# Runs on every PR/push. Does not package Electron installers.
name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Format is OS-sensitive (CRLF vs LF). Gate style only on Linux; always
      # run lint + typecheck so logic stays covered on every platform.
      - name: Lint / typecheck
        if: runner.os != 'Linux'
        run: pnpm check:types

      - name: Lint / typecheck / format
        if: runner.os == 'Linux'
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Build packages
        run: pnpm build
