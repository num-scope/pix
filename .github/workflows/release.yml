# Tag-driven multi-platform installers + GitHub Release.
# Push a tag like v0.1.0 → build NSIS / DMG / AppImage+deb → attach to the release.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/../.cache/electron-builder
      ELECTRON_CACHE: ${{ github.workspace }}/../.cache/electron
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: macos-15-intel
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Install Electron binary
        run: pnpm electron:install

      - name: Package desktop installers
        run: pnpm package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          out="apps/desktop/release/app"
          if [[ ! -d "$out" ]]; then
            echo "Missing package output: $out" >&2
            exit 1
          fi
          mkdir -p artifacts
          shopt -s nullglob
          matched=("$out"/*.exe "$out"/*.dmg "$out"/*.AppImage "$out"/*.deb)
          if [[ ${#matched[@]} -eq 0 ]]; then
            echo "No installer artifacts under $out" >&2
            ls -la "$out" >&2 || true
            exit 1
          fi
          for file in "${matched[@]}"; do
            cp -f "$file" artifacts/
            ls -lh "artifacts/$(basename "$file")"
          done

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pix-${{ matrix.platform }}-${{ runner.arch }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish release
    needs: package
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pix-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
