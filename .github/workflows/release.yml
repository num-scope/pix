# Tag-driven multi-platform package + GitHub Release.
# Push a tag like v0.1.0 → build on Linux/Windows/macOS → attach zips to the release.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron

jobs:
  package:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Install Electron binary
        run: pnpm electron:install

      - name: Package desktop (unsigned dir)
        run: pnpm package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Archive package
        shell: bash
        run: |
          set -euo pipefail
          out="apps/desktop/release/app"
          if [[ ! -d "$out" ]]; then
            echo "Missing package output: $out" >&2
            exit 1
          fi
          mkdir -p artifacts
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            stamp="${{ github.ref_name }}"
          else
            stamp="run-${{ github.run_number }}"
          fi
          archive="artifacts/Pix-${stamp}-${{ matrix.platform }}-${{ runner.arch }}.zip"
          # Portable zip on all GHA images (tar -a writes zip when suffix is .zip).
          (cd "$out" && tar -a -cf "$GITHUB_WORKSPACE/$archive" .)
          ls -lh "$archive"
          echo "ARCHIVE_PATH=$archive" >> "$GITHUB_ENV"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pix-${{ matrix.platform }}-${{ runner.arch }}
          path: artifacts/*.zip
          if-no-files-found: error
          retention-days: 14

  # Only when a version tag is pushed: publish GitHub Release with the zips.
  publish:
    name: publish release
    needs: package
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pix-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
