<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="880" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#222228"/>
      <stop offset="1" stop-color="#121216"/>
    </linearGradient>
    <linearGradient id="mark" x1="300" y1="240" x2="720" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9BB0FF"/>
      <stop offset="0.55" stop-color="#5B7CFF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Squircle app tile -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!--
    Clean π mark (pi agent) + cyan pixel spark (Pix / desktop shell).
    Built from simple rounded rects so it stays crisp at every size.
  -->
  <!-- Top bar -->
  <rect x="286" y="292" width="452" height="96" rx="48" fill="url(#mark)"/>
  <!-- Left stem -->
  <rect x="332" y="340" width="96" height="392" rx="48" fill="url(#mark)"/>
  <!-- Right stem (slightly shorter) -->
  <rect x="548" y="340" width="96" height="320" rx="48" fill="url(#mark)"/>

  <!-- Pixel spark cluster (top-right of mark) -->
  <rect x="686" y="248" width="88" height="88" rx="22" fill="#7DD3FC"/>
  <rect x="780" y="286" width="48" height="48" rx="14" fill="#38BDF8"/>
  <rect x="724" y="196" width="40" height="40" rx="12" fill="#E0F2FE"/>
</svg>
