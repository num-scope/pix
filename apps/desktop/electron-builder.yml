appId: dev.pix.app
productName: Pix
# package.json name is @pix/desktop — override so AppImage/deb paths stay valid.
executableName: Pix
asar: true
files:
  - dist/**
  - package.json
directories:
  output: release/app
  buildResources: build
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
publish: null
mac:
  identity: null
  icon: icon.icns
  target:
    - dmg
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
dmg:
  writeUpdateInfo: false
win:
  icon: icon.ico
  target:
    - nsis
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
linux:
  icon: icon.png
  executableName: Pix
  maintainer: num-scope <noreply@users.noreply.github.com>
  target:
    - AppImage
    - deb
  category: Development
  synopsis: Desktop shell for the pi coding agent
  description: Pix is a desktop shell for the pi coding agent.
asarUnpack:
  - "**/*.node"
  - "**/@silvia-odwyer/photon-node/**"
